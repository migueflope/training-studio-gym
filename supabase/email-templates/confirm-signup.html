<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmá tu cuenta</title>
  </head>
  <body style="margin:0;padding:0;background-color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" width="100%" style="max-width:600px;margin:0 auto;background-color:#ffffff;">
      <!-- Hero banner: logo grande, dorado vivo -->
      <tr>
        <td style="padding:32px 24px;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background:linear-gradient(135deg,#b8860b 0%,#d4af37 50%,#b8860b 100%);border-radius:16px;">
            <tr>
              <td align="center" style="padding:80px 24px;">
                <img src="https://jigwpntqxywjwruftwix.supabase.co/storage/v1/object/public/gym-media/logo-transparent.png" alt="Training Studio Gym" width="120" height="120" style="display:block;margin:0 auto;height:auto;max-width:120px;" />
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Body -->
      <tr>
        <td style="padding:8px 32px 24px;">
          <h1 style="margin:0 0 16px;color:#0a0a0a;font-size:32px;font-weight:800;letter-spacing:-0.5px;">
            Bienvenido a Training Studio Gym
          </h1>
          <p style="margin:0;color:#4b5563;font-size:16px;line-height:1.6;">
            Falta un solo paso para activar tu cuenta. Hacé click en el botón de abajo para confirmar tu correo y empezar.
          </p>
        </td>
      </tr>

      <!-- CTA button: grande, dorado -->
      <tr>
        <td style="padding:16px 32px 32px;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0">
            <tr>
              <td style="border-radius:10px;background-color:#d4af37;">
                <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=signup&next=/dashboard" style="display:inline-block;padding:18px 44px;color:#0a0a0a;font-size:17px;font-weight:800;text-decoration:none;border-radius:10px;">
                  Confirmar mi cuenta
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Disclaimer mínimo -->
      <tr>
        <td style="padding:0 32px 48px;">
          <p style="margin:0;color:#9ca3af;font-size:13px;line-height:1.5;">
            Si no creaste esta cuenta, podés ignorar este correo. El enlace expira en 24 horas.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
