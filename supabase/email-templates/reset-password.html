<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña</title>
</head>
<body style="margin: 0; padding: 0; background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #000000;">
    <tr>
      <td align="center" style="padding: 40px 0;">
        <!-- CONTENEDOR PRINCIPAL -->
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width: 500px; margin: 0 auto; background-color: #0a0a0a; border: 1px solid #222222; border-radius: 12px; overflow: hidden;">
          
          <!-- HEADER / LOGO -->
          <tr>
            <td align="center" style="padding: 40px 20px 20px 20px;">
              <img src="https://jigwpntqxywjwruftwix.supabase.co/storage/v1/object/public/gym-media/logo-transparent.png" alt="TRAINING STUDIO GYM" width="140" style="display: block; width: 140px; max-width: 100%; border: 0;" />
            </td>
          </tr>

          <!-- TÍTULO -->
          <tr>
            <td align="center" style="padding: 10px 30px 20px 30px;">
              <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 700; letter-spacing: -0.5px;">Recupera tu acceso</h1>
            </td>
          </tr>

          <!-- TEXTO CORTO -->
          <tr>
            <td align="center" style="padding: 0 30px 30px 30px;">
              <p style="margin: 0; color: #a1a1aa; font-size: 15px; line-height: 1.5;">
                Hemos recibido una solicitud para cambiar tu contraseña. Haz clic en el botón para crear una nueva.
              </p>
            </td>
          </tr>

          <!-- BOTÓN PREMIUM -->
          <tr>
            <td align="center" style="padding: 0 30px 40px 30px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="center" style="border-radius: 8px; background-color: #d4af37; border: 1px solid #eab308;">
                    <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/recuperar/cambiar" target="_blank" style="font-size: 14px; font-weight: 800; letter-spacing: 1px; color: #000000; text-decoration: none; border-radius: 8px; padding: 16px 32px; border: 1px solid #d4af37; display: inline-block; text-transform: uppercase;">
                      Cambiar contraseña
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td align="center" style="padding: 20px 30px; background-color: #050505; border-top: 1px solid #1a1a1a;">
              <p style="margin: 0; color: #52525b; font-size: 12px; line-height: 1.4;">
                Si no pediste cambiar tu contraseña, ignora este correo.<br/>El enlace es válido por 1 hora.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
